<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta http-equiv="Content-Security-Policy" content="default-src 'self' 'unsafe-inline' data:;" />
  <title>BBZ Cloud Hub</title>
  <style>
    html, body {
      margin: 0; height: 100%;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      background: #1a202c; color: #e2e8f0;
      font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
      user-select: none;
    }
    img { width: 96px; height: 96px; margin-bottom: 20px; }
    h1 { font-size: 18px; font-weight: 600; margin: 0 0 6px; }
    p { font-size: 13px; color: #a0aec0; margin: 0 0 24px; }
    .spinner {
      width: 28px; height: 28px;
      border: 3px solid rgba(255,255,255,0.15);
      border-top-color: #4299e1;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <img src="assets/logo.png" alt="BBZ Cloud" onerror="this.style.display='none'" />
  <h1>BBZ Cloud Hub</h1>
  <p>Nextcloud wird geladen …</p>
  <div class="spinner"></div>
</body>
</html>
